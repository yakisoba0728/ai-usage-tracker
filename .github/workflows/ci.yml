name: CI
# Runs on every branch push (this repo's workflow pushes branches directly,
# often without a PR) and on pull requests.
on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (lint + typecheck + vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # pnpm version comes from package.json "packageManager" (X-7) — do NOT also
      # set `version` here or action-setup errors on the conflict.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Type-check
        run: pnpm typecheck
      - name: Unit tests
        run: pnpm test

  rust:
    name: Rust (fmt + clippy + test)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { components: "rustfmt, clippy" }
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: src-tauri }
      - name: cargo fmt --check
        # fmt is platform-agnostic, so one OS is enough.
        if: matrix.os == 'macos-latest'
        working-directory: src-tauri
        run: cargo fmt --all -- --check
      - name: cargo clippy
        # Run on BOTH legs: the macOS leg compiles out every
        # `#[cfg(target_os = "windows")]` / `not(macos)` arm, so the Windows
        # leg is the only one that lints the real Windows code paths (X-4).
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings
      - name: cargo test
        working-directory: src-tauri
        run: cargo test --lib --locked
