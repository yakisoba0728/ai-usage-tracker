name: Build smoke
# Compile-and-smoke only: debug build, no bundle, NO code signing.
# Release bundling/signing/notarization is a separate (future) pipeline.
on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: tauri build (debug, no-bundle)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: pnpm }
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: src-tauri }
      - run: pnpm install --frozen-lockfile
      - name: tauri build (debug, no bundle, NO signing)
        run: pnpm exec tauri build --debug --no-bundle
